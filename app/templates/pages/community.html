{% extends 'base.html' %}

{% block title %}Community - Explore Trips | Traveloop{% endblock %}

{% block content %}
<div class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
    <!-- Hero Header -->
    <div class="text-center mb-16">
        <h1 class="text-4xl md:text-6xl font-extrabold text-gray-900 dark:text-white mb-4">Explore the <span class="text-transparent bg-clip-text bg-gradient-to-r from-violet-600 to-indigo-600">World</span></h1>
        <p class="text-xl text-gray-500 dark:text-gray-400 max-w-2xl mx-auto">Discover incredible itineraries from our community of travelers and get inspired for your next adventure.</p>
    </div>

    <!-- Feed Grid -->
    <div id="community-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Loader -->
        <div class="col-span-full flex justify-center py-20" id="feed-loader">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-violet-600"></div>
        </div>
    </div>

    <!-- Load More -->
    <div class="mt-12 text-center hidden" id="load-more-container">
        <button id="load-more-btn" class="px-8 py-3 bg-white dark:bg-gray-800 text-violet-600 font-bold rounded-xl border border-violet-100 dark:border-gray-700 hover:bg-violet-50 transition-all shadow-sm">
            Load More Adventures
        </button>
    </div>
</div>

<script>
let currentPage = 1;

async function loadFeed(page = 1) {
    const loader = document.getElementById('feed-loader');
    const container = document.getElementById('community-feed');
    const loadMore = document.getElementById('load-more-container');
    
    try {
        const response = await fetch(`/api/community/feed?page=${page}`);
        const data = await response.json();
        
        if (page === 1) {
            container.innerHTML = '';
            if (data.trips.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">No public trips found. Be the first to share one!</div>';
            }
        }
        
        data.trips.forEach(trip => {
            const card = document.createElement('div');
            card.className = 'group bg-white dark:bg-gray-800 rounded-3xl shadow-xl overflow-hidden border border-gray-100 dark:border-gray-700 transition-all hover:scale-[1.02] hover:shadow-2xl';
            card.innerHTML = `
                <div class="relative h-56 overflow-hidden">
                    <img src="${trip.image_url || '/static/img/default-trip.jpg'}" alt="${trip.destination}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                    <div class="absolute bottom-4 left-4">
                        <span class="bg-white/20 backdrop-blur-md text-white text-xs px-3 py-1 rounded-full border border-white/30">
                            <i class="fas fa-map-marker-alt mr-1"></i> ${trip.destination}
                        </span>
                    </div>
                </div>
                <div class="p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-8 h-8 rounded-full bg-violet-100 dark:bg-violet-900/30 flex items-center justify-center text-violet-600 dark:text-violet-400 font-bold text-xs">
                            ${trip.username[0].toUpperCase()}
                        </div>
                        <span class="text-sm font-bold text-gray-900 dark:text-white">${trip.username}</span>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2 line-clamp-1">${trip.title}</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
                        <i class="far fa-calendar-alt mr-1"></i> ${new Date(trip.start_date).toLocaleDateString()}
                    </p>
                    
                    <div class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-gray-700">
                        <div class="flex gap-4">
                            <button onclick="toggleLike(${trip.id}, this)" class="flex items-center gap-1.5 text-sm ${trip.is_liked ? 'text-rose-500' : 'text-gray-500 hover:text-rose-500'} transition-colors">
                                <i class="${trip.is_liked ? 'fas' : 'far'} fa-heart"></i>
                                <span>${trip.like_count}</span>
                            </button>
                            <div class="flex items-center gap-1.5 text-sm text-gray-500">
                                <i class="far fa-comment"></i>
                                <span>${trip.comment_count}</span>
                            </div>
                        </div>
                        <a href="/trips/${trip.id}" class="text-sm font-bold text-violet-600 hover:text-violet-700">View Details <i class="fas fa-arrow-right ml-1"></i></a>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
        
        if (data.has_next) {
            loadMore.classList.remove('hidden');
            currentPage = data.next_page;
        } else {
            loadMore.classList.add('hidden');
        }
        
    } catch (e) {
        console.error('Feed error:', e);
    } finally {
        if (loader) loader.remove();
    }
}

async function toggleLike(tripId, btn) {
    try {
        const response = await fetch(`/api/community/trips/${tripId}/like`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('meta[name="csrf-token"]')?.getAttribute('content')
            }
        });
        
        if (response.status === 401) {
            Notify.error('Please login to like trips');
            return;
        }
        
        const data = await response.json();
        const icon = btn.querySelector('i');
        const count = btn.querySelector('span');
        
        if (data.liked) {
            icon.classList.replace('far', 'fas');
            btn.classList.replace('text-gray-500', 'text-rose-500');
        } else {
            icon.classList.replace('fas', 'far');
            btn.classList.replace('text-rose-500', 'text-gray-500');
        }
        count.textContent = data.count;
        
    } catch (e) {
        Notify.error('Action failed');
    }
}

document.getElementById('load-more-btn')?.addEventListener('click', () => loadFeed(currentPage));

// Initial load
loadFeed();
</script>
{% endblock %}
