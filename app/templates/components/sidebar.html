<!-- Sidebar Component for Dashboard -->
<div id="dashboard-sidebar" class="fixed inset-y-0 left-0 z-30 w-64 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 transform -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out overflow-y-auto">
    <div class="flex flex-col h-full">
        <!-- Sidebar Header -->
        <div class="p-6 border-b border-gray-200 dark:border-slate-800">
            <h2 class="text-lg font-bold text-gray-900 dark:text-white">Menu</h2>
        </div>
        
        <!-- Navigation Links -->
        <nav class="flex-1 p-4 space-y-2">
            <!-- Dashboard Link -->
            <a href="{{ url_for('main.dashboard') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors duration-200" id="nav-dashboard">
                <i class="fas fa-home text-sky-500 w-5"></i>
                <span class="font-medium">Dashboard</span>
            </a>
            
            <!-- My Trips Link -->
            <a href="{{ url_for('trips.my_trips') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors duration-200" id="nav-trips">
                <i class="fas fa-map text-orange-500 w-5"></i>
                <span class="font-medium">My Trips</span>
            </a>
            
            <!-- Community Link -->
            <a href="{{ url_for('main.community') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors duration-200" id="nav-community">
                <i class="fas fa-users text-purple-500 w-5"></i>
                <span class="font-medium">Community</span>
            </a>
            
            <!-- Divider -->
            <div class="my-4 border-t border-gray-200 dark:border-slate-800"></div>
            
            <!-- Settings Link -->
            <a href="{{ url_for('settings.settings_page') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors duration-200" id="nav-settings">
                <i class="fas fa-cog text-gray-500 w-5"></i>
                <span class="font-medium">Settings</span>
            </a>
            
            <!-- Profile Link -->
            <a href="{{ url_for('main.profile_self') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-800 transition-colors duration-200" id="nav-profile">
                {% if current_user.profile_picture %}
                <img src="{{ current_user.profile_picture }}" alt="Profile" class="w-5 h-5 rounded-full object-cover border border-gray-200 dark:border-gray-700">
                {% else %}
                <img src="{{ url_for('static', filename='img/default_avatar.png') }}" alt="Default Profile" class="w-5 h-5 rounded-full object-cover border border-gray-200 dark:border-gray-700">
                {% endif %}
                <span class="font-medium">Profile</span>
            </a>
        </nav>
        
        <!-- Sidebar Footer -->
        <div class="p-4 border-t border-gray-200 dark:border-slate-800">
            <a href="{{ url_for('auth.logout') }}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors duration-200 font-medium">
                <i class="fas fa-sign-out-alt w-5"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>
</div>

<!-- Sidebar Toggle for Mobile -->
<button id="sidebar-toggle" class="md:hidden fixed bottom-4 right-4 z-20 w-12 h-12 bg-sky-500 text-white rounded-full shadow-lg hover:bg-sky-600 transition-colors duration-200 flex items-center justify-center">
    <i class="fas fa-bars text-lg"></i>
</button>

<!-- Overlay for Mobile Sidebar -->
<div id="sidebar-overlay" class="md:hidden fixed inset-0 bg-black/50 z-20 hidden"></div>

<script>
    // Sidebar toggle functionality
    const sidebarToggle = document.getElementById('sidebar-toggle');
    const sidebar = document.getElementById('dashboard-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    
    if (sidebarToggle) {
        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        });
        
        overlay.addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
        });
    }
    
    // Active nav item highlighting
    function setActiveNavItem() {
        const currentPath = window.location.pathname;
        const navItems = document.querySelectorAll('#dashboard-sidebar a[id^="nav-"]');
        
        navItems.forEach(item => {
            item.classList.remove('bg-sky-50', 'dark:bg-sky-900/20', 'text-sky-600', 'dark:text-sky-300');
            
            if (item.id === 'nav-dashboard' && (currentPath.includes('dashboard') || currentPath === '/')) {
                item.classList.add('bg-sky-50', 'dark:bg-sky-900/20', 'text-sky-600', 'dark:text-sky-300');
            } else if (item.id === 'nav-trips' && currentPath.includes('trips')) {
                item.classList.add('bg-sky-50', 'dark:bg-sky-900/20', 'text-sky-600', 'dark:text-sky-300');
            } else if (item.id === 'nav-community' && currentPath.includes('community')) {
                item.classList.add('bg-sky-50', 'dark:bg-sky-900/20', 'text-sky-600', 'dark:text-sky-300');
            } else if (item.id === 'nav-settings' && currentPath.includes('settings')) {
                item.classList.add('bg-sky-50', 'dark:bg-sky-900/20', 'text-sky-600', 'dark:text-sky-300');
            } else if (item.id === 'nav-profile' && currentPath.includes('profile')) {
                item.classList.add('bg-sky-50', 'dark:bg-sky-900/20', 'text-sky-600', 'dark:text-sky-300');
            }
        });
    }
    
    // Call on page load
    setActiveNavItem();
</script>
