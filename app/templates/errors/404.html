{% extends 'base.html' %}

{% block title %}Page Not Found - Traveloop{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="text-center">
        <div class="mb-8">
            <h1 class="text-9xl font-extrabold text-violet-600 opacity-20">404</h1>
            <div class="mt-[-4rem]">
                <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Lost in Transit?</h2>
                <p class="text-gray-500 dark:text-gray-400 max-w-md mx-auto">The page you're looking for has wandered off the map. Let's get you back on track.</p>
            </div>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{{ url_for('main.dashboard') }}" class="px-8 py-3 bg-violet-600 hover:bg-violet-700 text-white font-bold rounded-xl shadow-lg shadow-violet-200 dark:shadow-none transition-all hover:scale-105">
                Go to Dashboard
            </a>
            <a href="javascript:history.back()" class="px-8 py-3 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 font-bold rounded-xl border border-gray-200 dark:border-gray-700 hover:bg-gray-50 transition-all">
                Go Back
            </a>
        </div>
        
        <div class="mt-16 text-gray-400">
            <i class="fas fa-compass fa-3x animate-bounce"></i>
        </div>
    </div>
</div>
{% endblock %}
